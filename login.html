<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin | RESCAR LEDS</title>
<style>
body {
    background:#000;
    color:#fff;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.login-container {
    background:#111;
    padding:30px;
    border-radius:10px;
    width:90%;
    max-width:400px;
}
.login-container h1 {
    color:#FF7700;
    text-align:center;
    margin-bottom:20px;
}
.login-container label {
    display:block;
    margin:10px 0 5px;
    color:#FF7700;
}
.login-container input {
    width:100%;
    padding:10px;
    border-radius:5px;
    border:1px solid #444;
    background:#222;
    color:#fff;
}
.login-container button {
    width:100%;
    padding:12px;
    background:#FF7700;
    border:none;
    border-radius:6px;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
}
.login-container p {
    margin-top:12px;
    text-align:center;
    font-size:14px;
}
.login-container a {
    color:#FF7700;
    text-decoration:none;
}
#error-msg {
    color:#ff4444;
    text-align:center;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="login-container">
    <h1>Login Admin</h1>
    <form id="login-form">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email" required>
        <label for="password">Senha:</label>
        <input type="password" id="password" placeholder="Digite sua senha" required>
        <button type="submit">Entrar</button>
        <div id="error-msg"></div>
    </form>
</div>

<script type="module">
import { supabase } from './supabase.js';

const form = document.getElementById('login-form');
const errorText = document.getElementById('error-msg');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorText.innerText = '';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if(!email || !password){
        errorText.innerText = 'Preencha todos os campos!';
        return;
    }

    // Busca o admin na tabela 'admins'
    const { data: adminUser, error } = await supabase
        .from('admins')
        .select('*')
        .ilike('email', email)  // ignora maiúsculas/minúsculas no email
        .eq('password', password) // compara a senha exatamente
        .single();

    if(error || !adminUser){
        errorText.innerText = 'Email ou senha inválidos';
        return;
    }

    // Login ok → redireciona para a página de admin
    window.location.href = 'admin.html';
});
</script>

</body>
</html>
