<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RESCAR LEDS – Lâmpadas DS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#000;color:#fff;padding-bottom:80px}

header{
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #222;
  position:sticky;
  top:0;
  z-index:10
}
.logo{font-size:20px;font-weight:bold}
.logo span{color:#FF7700}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:8px;
  padding:10px;
  text-align:center
}

.carousel{
  width:100%;
  aspect-ratio:1/1;
  overflow:hidden;
  border-radius:6px;
  margin-bottom:6px
}
.track{
  display:flex;
  transition:.5s
}
.track img{
  width:100%;
  flex:0 0 100%;
  object-fit:cover
}

.title{
  font-size:13px;
  height:32px;
  overflow:hidden
}

.price-old{
  color:#777;
  text-decoration:line-through;
  font-size:13px
}
.price{
  color:#FF7700;
  font-weight:bold;
  font-size:18px;
  margin:4px 0
}

.buy{
  background:#FF7700;
  border:none;
  padding:10px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer
}

/* CART */
#cart{
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:15px;
  transition:.3s;
  z-index:20;
  overflow-y:auto
}
#cart.open{right:0}

.cart-item{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #222;
  padding:8px 0
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  z-index:15
}
.overlay.active{display:block}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<header>
  <i class="fa-solid fa-cart-shopping" onclick="toggleCart()"></i>
  <div class="logo">RESCAR <span>LEDS</span></div>
  <span id="count">0</span>
</header>

<main class="grid" id="products"></main>

<!-- CARRINHO -->
<div id="cart">
  <h3>Carrinho</h3>
  <div id="cart-items"></div>
  <button class="buy" onclick="checkout()">Finalizar</button>
</div>

<script type="module">
import { supabase } from './supabase.js'

const productsEl=document.getElementById('products')
const cartEl=document.getElementById('cart')
const overlay=document.getElementById('overlay')
const countEl=document.getElementById('count')

let cart=[]

/* ===== LOAD PRODUCTS DS ===== */
async function loadProducts(){
  const { data, error } = await supabase
    .from('products')
    .select('*')
     .ilike('name', 'D%');
    .order('id',{ascending:false})
  if(error){alert(error.message);return}

  productsEl.innerHTML=''

  data.forEach(p=>{
    const card=document.createElement('div')
    card.className='card'

    const track=document.createElement('div')
    track.className='track'

    if(p.images){
      p.images.forEach(img=>{
        const i=document.createElement('img')
        i.src=`https://uvywywtmtcjtslwlltha.supabase.co/storage/v1/object/public/Produtcs/${img}`
        track.appendChild(i)
      })
    }

    const carousel=document.createElement('div')
    carousel.className='carousel'
    carousel.appendChild(track)

    let priceHTML=''
    if(p.promo_active && p.sale_price){
      priceHTML=`
        <div class="price-old">R$ ${p.old_price.toFixed(2).replace('.',',')}</div>
        <div class="price">R$ ${p.sale_price.toFixed(2).replace('.',',')}</div>
      `
    }else{
      priceHTML=`<div class="price">R$ ${p.price.toFixed(2).replace('.',',')}</div>`
    }

    card.innerHTML=`
      <div class="title">${p.name}</div>
      ${priceHTML}
      <button class="buy">Comprar</button>
    `

    card.prepend(carousel)
    productsEl.appendChild(card)

    card.querySelector('.buy').onclick=()=>{
      addToCart(p.id,p.name,p.sale_price||p.price)
    }

    if(track.children.length>1){
      let idx=0
      setInterval(()=>{
        idx=(idx+1)%track.children.length
        track.style.transform=`translateX(-${idx*100}%)`
      },2500)
    }
  })
}

/* ===== CART ===== */
function addToCart(id,name,price){
  const item=cart.find(i=>i.id===id)
  if(item)item.qtd++
  else cart.push({id,name,price,qtd:1})
  updateCart()
}

function updateCart(){
  const el=document.getElementById('cart-items')
  el.innerHTML=''
  let total=0
  cart.forEach(i=>{
    total+=i.qtd
    el.innerHTML+=`
      <div class="cart-item">
        <span>${i.qtd}x ${i.name}</span>
        <strong>R$ ${(i.qtd*i.price).toFixed(2).replace('.',',')}</strong>
      </div>
    `
  })
  countEl.innerText=total
}

window.toggleCart=()=>{
  cartEl.classList.toggle('open')
  overlay.classList.toggle('active')
}

window.checkout=()=>location.href='checkout.html'

/* ===== REALTIME ===== */
supabase
  .channel('products-ds')
  .on('postgres_changes',{event:'*',schema:'public',table:'products'},loadProducts)
  .subscribe()

loadProducts()
</script>

</body>
</html>
