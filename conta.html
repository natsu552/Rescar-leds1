<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Conta | RESCAR LEDS</title>

<link rel="stylesheet" href="Rescar2.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* OVERLAY */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    z-index:999;
}
#overlay.active{display:block}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:0;
    left:-270px;
    width:260px;
    height:100%;
    background:#000;
    padding:20px;
    transition:.3s;
    z-index:1000;
    border-right:2px solid #FF7700;
}
.sidebar.active{left:0}

.user-info{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.user-avatar{
    width:40px;
    height:40px;
    background:#FF7700;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#000;
    font-size:18px;
}

.user-name{
    font-weight:bold;
    color:#fff;
}

.user-register{
    margin-bottom:15px;
}

.user-register a{
    display:block;
    background:#FF7700;
    color:#000;
    text-align:center;
    padding:8px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.sidebar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:15px 0;
    color:#FF7700;
}

.sidebar-nav a{
    display:block;
    padding:10px 0;
    color:#fff;
    text-decoration:none;
    border-bottom:1px solid #111;
}
.sidebar-nav a:hover{color:#FF7700}

.menu-title{
    display:block;
    font-size:12px;
    color:#FF7700;
    margin:10px 0;
}

/* CONTAINER DA CONTA */
.account-container{
    max-width:600px;
    margin:80px auto 50px;
    background:#111;
    padding:30px;
    border-radius:10px;
    color:#fff;
    font-family: Arial,sans-serif;
}
.account-container h1{
    color:#FF7700;
    text-align:center;
    margin-bottom:20px;
}
.account-container .info{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    padding:10px;
    background:#222;
    border-radius:6px;
}
.account-container .info span{
    font-weight:bold;
}
.account-container .logout-btn{
    display:block;
    width:100%;
    padding:12px;
    background:#FF7700;
    color:#000;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
    text-align:center;
    text-decoration:none;
}
</style>
</head>
<body class="bg-black">

<!-- OVERLAY -->
<div id="overlay" onclick="toggleMenu()"></div>

<!-- MENU -->
<div id="sideMenu" class="sidebar">

    <div class="user-info" id="user-info">
        <div class="user-avatar" id="user-avatar">
            <i class="fa-solid fa-user"></i>
        </div>
        <div class="user-name" id="user-name">Visitante</div>
    </div>

    <div class="user-register" id="register-box">
        <a href="criar.html">Registrar</a>
    </div>

    <div class="sidebar-header">
        <strong>MENU PRINCIPAL</strong>
        <i class="fa-solid fa-xmark" onclick="toggleMenu()"></i>
    </div>

    <nav class="sidebar-nav">
        <a href="Site.html">INICIO</a>

        <span class="menu-title">Categorias</span>
        <a href="Ledcolor.html">LED RESCAR COLORPHONE 📲</a>
        <a href="Ledrescar.html">LED RESCAR</a>
        <a href="Ledpingo.html">Pingo / Torpedo</a>
        <a href="Lampadas-ds.html">LEDS DS</a>
        <a href="Lampadas-polos.html">LEDS DE POLOS</a>

        <span class="menu-title">Contato</span>
        <a href="contato.html">Contato / Suporte</a>
        <a href="localizacao.html">Localização</a>
        <a href="login.html">Login</a>
    </nav>
</div>

<header class="header-black">
    <div class="header-container">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="logo">RES<span>CAR</span></div>
        <div class="cart" style="color:#FF7700">🛒 <span id="cart-count">0</span></div>
    </div>
</header>

<div class="account-container">
    <h1>Minha Conta</h1>

    <div class="info"><span>Nome:</span> <span id="acc-name">Carregando...</span></div>
    <div class="info"><span>Email:</span> <span id="acc-email">Carregando...</span></div>

    <button class="logout-btn" id="logout-btn">Sair da Conta</button>
</div>

<script>
function toggleMenu(){
    document.getElementById('sideMenu').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
}

// Redireciona para conta.html ao clicar no avatar ou nome
document.getElementById('user-info').addEventListener('click', () => {
    window.location.href = 'conta.html';
});
</script>

<script type="module">
import { supabase } from './supabase.js';

async function carregarUsuario(){

    const { data: { user } } = await supabase.auth.getUser();

    if(!user){
        document.getElementById("user-name").innerText = "Visitante";
        document.getElementById("register-box").style.display = "block";
        document.getElementById("acc-name").innerText = "-";
        document.getElementById("acc-email").innerText = "-";
        return;
    }

    // Busca o nome do usuário na tabela users_cart pelo email
    const { data, error } = await supabase
        .from("users_cart")
        .select("*")
        .eq("email", user.email)
        .single();

    if(error){
        console.log("Erro ao buscar usuário:", error.message);
        document.getElementById("user-name").innerText = "Usuário";
        return;
    }

    if(data){
        document.getElementById("user-name").innerText = data.name || "Usuário";
        document.getElementById("register-box").style.display = "none";

        // Preenche os campos da conta
        document.getElementById("acc-name").innerText = data.name || "-";
        document.getElementById("acc-email").innerText = data.email || "-";
    }
}

// Logout
document.getElementById('logout-btn').addEventListener('click', async () => {
    const { error } = await supabase.auth.signOut();
    if(error){
        alert('Erro ao sair: ' + error.message);
    } else {
        window.location.href = 'lite.html';
    }
});

carregarUsuario();
</script>

</body>
</html>
