<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta | RESCAR LEDS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
    background:#000; color:#fff;
    font-family: Arial,sans-serif;
    display:flex; justify-content:center; align-items:center;
    height:100vh;
    margin:0;
}
.register-container {
    background:#111; padding:30px; border-radius:10px;
    width:90%; max-width:400px;
    box-shadow: 0 0 10px #FF7700;
}
.register-container h1 {
    color:#FF7700; text-align:center; margin-bottom:20px;
}
.register-container label {
    display:block; margin:10px 0 5px; color:#FF7700;
}
.register-container input {
    width:100%; padding:10px; border-radius:5px;
    border:1px solid #444; background:#222; color:#fff;
}
.register-container input:focus {
    outline:none;
    border-color:#FF7700;
}
.register-container button {
    width:100%; padding:12px; background:#FF7700;
    border:none; border-radius:6px; color:#000;
    font-weight:bold; cursor:pointer; margin-top:15px;
    transition: 0.2s;
}
.register-container button:hover {
    background:#ff9933;
}
.register-container p {
    margin-top:12px; text-align:center;
    font-size:14px;
}
.register-container a {
    color:#FF7700; text-decoration:none;
}
.register-container a:hover {
    text-decoration:underline;
}
</style>
</head>
<body>

<div class="register-container">
    <h1>Criar Conta</h1>
    <label for="name">Nome:</label>
    <input type="text" id="name" placeholder="Digite seu nome" required>

    <label for="email">Gmail:</label>
    <input type="email" id="email" placeholder="Digite seu Gmail" required>
    
    <label for="password">Senha:</label>
    <input type="password" id="password" placeholder="Digite sua senha" required>
    
    <button id="register-btn">Criar Conta</button>
    
    <p>Já tem conta? <a href="login1.html">Entrar</a></p>
</div>

<script type="module">
import { supabase } from './supabase.js';

const registerBtn = document.getElementById('register-btn');

registerBtn.addEventListener('click', async () => {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if(!name || !email || !password){
        alert('Preencha todos os campos!');
        return;
    }

    // Cria usuário no Supabase Auth
    const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password
    });

    if(error){
        alert('Erro ao criar conta: ' + error.message);
        return;
    }

    // Salva o nome e email na tabela users_cart
    const { error: dbError } = await supabase
        .from('users_cart')
        .insert([{ email: email, name: name, cart: [] }]);

    if(dbError){
        alert('Erro ao salvar usuário no banco: ' + dbError.message);
        return;
    }

    alert('Conta criada com sucesso!');
    window.location.href = "login1.html";
});
</script>

</body>
</html>
