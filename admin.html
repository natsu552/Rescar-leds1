<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin | RESCAR LEDS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<header class="admin-header">
  <h1>RESCAR <span>LEDS</span> <small>Admin</small></h1>
  <!-- Botão para voltar para lite.html -->
  <button id="btn-back">Voltar para Lite</button>
</header>

<main class="admin-container">
  <div id="products-list" class="products-grid"></div>
</main>

<aside id="edit-panel" class="edit-panel">
  <div class="panel-header">
    <h2>Editar Produto</h2>
    <button id="close-panel">✖</button>
  </div>

  <form id="edit-form">
    <label>Nome</label>
    <input type="text" id="edit-name" required>

    <label>Preço Normal (R$)</label>
    <input type="number" id="edit-price" step="0.01" required>

    <label>Preço Antigo (Promoção)</label>
    <input type="number" id="edit-old-price" step="0.01">

    <label style="display:flex;align-items:center;gap:8px;margin-top:10px;">
      <input type="checkbox" id="edit-promo-active" style="width:auto;">
      Ativar Promoção
    </label>

    <label>Imagens (URLs separadas por vírgula)</label>
    <input type="text" id="edit-images">

    <button type="submit" class="save-btn">Salvar Alterações</button>
  </form>
</aside>

<script type="module">
  // Botão voltar para lite.html
  document.getElementById('btn-back').addEventListener('click', () => {
    window.location.href = 'lite.html';
  });
</script>

<script type="module" src="admin.js"></script>
</body>
</html>
